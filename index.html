<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রাজশাহী অলিম্পিয়াড সোসাইটি</title><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color:white;
  text-align:center;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  padding:20px;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid #fff;
  box-shadow:0 0 20px rgba(0,198,255,0.7);
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

h1{margin:10px 0 5px;font-size:24px}
.subtitle{opacity:0.8;margin-bottom:20px}

.card{
  background: rgba(255,255,255,0.08);
  margin:15px auto;
  padding:20px;
  border-radius:20px;
  backdrop-filter: blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  max-width:500px;
  animation: fadeIn 1s ease;
}

.countdown{
  font-size:18px;
  margin-top:10px;
  color:#00eaff;
  font-weight:bold;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

/* Table */
table{
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

/* Popup */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  animation: fadeIn 0.5s ease;
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

@media(max-width:600px){
  h1{font-size:20px}
  .logo{width:90px;height:90px}
}

</style></head><body><div class="container"><img src="logo.png" class="logo">
<h1>রাজশাহী অলিম্পিয়াড সোসাইটি</h1>
<p class="subtitle">মেধার লালন, দক্ষতার গঠন</p><div class="card">
<h3>আমাদের পরবর্তী সভা</h3>
<p id="meetingInfo"></p>
<p id="countdown" class="countdown"></p>
<div id="joinSection"></div>
</div><div class="card">
<h3>বিগত সভা সমূহ</h3>
<table>
<tr><th>ক্রমিক</th><th>তারিখ</th><th>বিষয়</th></tr>
<tr><td>১</td><td>০১-০১-২০২৬</td><td>গণিত অলিম্পিয়াড</td></tr>
<tr><td>২</td><td>১৫-০১-২০২৬</td><td>বিজ্ঞান কুইজ</td></tr>
</table>
</div></div><!-- Popup --><div id="popup">
  <div class="popup-box">
    <h3>সভায় যোগদানের নিয়ম</h3>
    <p>
    ১. বাটনে ক্লিক করুন<br>
    ২. নাম লিখুন<br>
    ৩. Join চাপুন<br>
    ৪. Login লাগবে না
    </p>
    <button onclick="joinMeeting()">সভায় যুক্ত হন</button>
  </div>
</div><script>
let meetingDate = "2026-04-15T18:16:00";
let subject = "গণিত আলোচনা";

if(!meetingDate){
  document.getElementById("meetingInfo").innerText =
  "পরবর্তী সভার জন্য কোনো সময় নির্ধারণ করা নেই।";
}else{

  let target = new Date(meetingDate);

  document.getElementById("meetingInfo").innerText =
  `বিষয়: ${subject}\nতারিখ: ${target.toLocaleDateString()}\nসময়: ${target.toLocaleTimeString()}`;

  let timer = setInterval(()=>{

    let now = new Date().getTime();
    let diff = target - now;

    if(diff < 0){
      clearInterval(timer);
      document.getElementById("countdown").innerHTML="";
      document.getElementById("joinSection").innerHTML =
      `<p>সভা শুরু হয়েছে</p>
      <button onclick="openPopup()">Join Now</button>`;
      return;
    }

    let d = Math.floor(diff/(1000*60*60*24));
    let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));
    let s = Math.floor((diff%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
    `সভা শুরু হতে আর বাকি ${d} দিন ${h} ঘন্টা ${m} মিনিট ${s} সেকেন্ড`;

  },1000);
}

function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function joinMeeting(){
  window.location.href="meeting.html";
}

</script></body>
</html>
